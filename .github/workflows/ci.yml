name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK and Android SDK
        uses: android-with-gradle/setup@v4
        with:
          android-version: "36"
          java-version: "11"

      - name: Run lint
        run: ./script/lint

      - name: Run tests
        run: ./script/test
